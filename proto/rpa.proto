syntax = "proto3";

package rpa.v1;

service RpaService {
    rpc RunWorkflow(RunWorkflowRequest) returns (RunWorkflowResponse);
    rpc RunScript(RunScriptRequest) returns (RunScriptResponse);
    rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);
    rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
    rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
    rpc StreamTaskEvents(StreamTaskEventsRequest) returns (stream TaskEvent);
}

message Value {
    oneof kind {
        bool null_value = 1;
        bool bool_value = 2;
        double number_value = 3;
        string string_value = 4;
    }
}

message RunWorkflowRequest {
    string plugin = 1;
    string workflow = 2;
    map<string, Value> args = 3;
    int64 timeout_ms = 4;
}

message RunWorkflowResponse {
    string task_id = 1;
    string status = 2;
    Value output = 3;
}

message RunScriptRequest {
    string plugin = 1;
    string script = 2;
    map<string, Value> args = 3;
    int64 timeout_ms = 4;
}

message RunScriptResponse {
    string task_id = 1;
    string status = 2;
    Value output = 3;
}

message GetTaskStatusRequest {
    string task_id = 1;
}

message GetTaskStatusResponse {
    string task_id = 1;
    string status = 2;
    Value output = 3;
    int64 duration_ms = 4;
    uint32 steps_executed = 5;
    string error = 6;
}

message CancelTaskRequest {
    string task_id = 1;
}

message CancelTaskResponse {}

message ListPluginsRequest {}

message PluginInfo {
    string name = 1;
    string version = 2;
    string description = 3;
    repeated string workflows = 4;
    repeated string scripts = 5;
}

message ListPluginsResponse {
    repeated PluginInfo plugins = 1;
}

message StreamTaskEventsRequest {
    string task_id = 1;
}

message InstructionStarted {
    uint32 index = 1;
    string instruction = 2;
}

message InstructionCompleted {
    uint32 index = 1;
    uint64 duration_ms = 2;
}

message InstructionFailed {
    uint32 index = 1;
    string error = 2;
    bool will_retry = 3;
}

message TaskCompleted {
    Value output = 1;
    uint64 duration_ms = 2;
}

message TaskFailed {
    string error = 1;
}

message TaskEvent {
    string task_id = 1;
    oneof event {
        InstructionStarted instruction_started = 2;
        InstructionCompleted instruction_completed = 3;
        InstructionFailed instruction_failed = 4;
        TaskCompleted task_completed = 5;
        TaskFailed task_failed = 6;
    }
}